[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.curl", "composer"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "chmod -R 777 bootstrap/cache",
    "chmod -R 777 storage"
]

[phases.deploy]
cmds = [
    "php artisan config:clear",
    "php artisan migrate --force",
    "php artisan db:seed --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"