services:
  - type: web
    name: settlimax-backend
    runtime: php
    buildCommand: composer install --no-dev --optimize-autoloader && chmod -R 777 bootstrap/cache && chmod -R 777 storage
    startCommand: bash start.sh
    envVars:
      - key: APP_NAME
        value: Settlimax
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: public